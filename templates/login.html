<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deal Dashboard — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f4f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border: 1px solid #e2e4e9;
      border-radius: 14px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,.07);
      text-align: center;
    }
    .brand-logo {
      width: 180px; height: auto;
      display: block;
      margin: 0 auto 24px;
    }
    h1 { font-size: 1.2rem; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    p  { font-size: .85rem; color: #6b7280; margin-bottom: 28px; }

    label { display: block; text-align: left; font-size: .78rem; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%; padding: 10px 14px;
      border: 1px solid #d1d5db; border-radius: 8px;
      font-size: .95rem; font-family: inherit; outline: none;
      transition: border-color .2s;
      margin-bottom: 16px;
    }
    input[type="password"]:focus { border-color: #ff5c35; }

    .error {
      background: #fef2f2; border: 1px solid #fecaca;
      color: #dc2626; border-radius: 7px;
      padding: 9px 14px; font-size: .85rem;
      margin-bottom: 16px; text-align: left;
    }

    button {
      width: 100%; padding: 11px;
      background: #ff5c35; color: #fff;
      border: none; border-radius: 8px;
      font-size: .95rem; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #e04d2a; }
  </style>
</head>
<body>
  <div class="card">
    <img class="brand-logo" src="{{ url_for('static', filename='runway_logo.png') }}" alt="Runway Selling" />
    <h1>Deal Allocation Dashboard</h1>
    <p>Enter your password to continue</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <input type="hidden" name="next" value="{{ next }}" />
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus autocomplete="current-password" />
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
